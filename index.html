<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sistema de Avaliação</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #0f172a;
  color: #e2e8f0;
  font-family: 'Inter', sans-serif;
}

.wrapper {
  max-width: 1100px;
  margin: auto;
  padding: 30px;
}

.card-custom {
  background: #1e293b;
  border-radius: 16px;
  padding: 25px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 25px;
}

.title {
  font-size: 22px;
  font-weight: 600;
}

.form-control {
  background: #0f172a;
  border: 1px solid #334155;
  color: #e2e8f0;
}

.form-control:focus {
  border-color: #22c55e;
  box-shadow: none;
}

.stars span {
  font-size: 32px;
  cursor: pointer;
  color: #475569;
  transition: 0.2s;
}

.stars span.active {
  color: #facc15;
}

.btn-primary {
  background: #22c55e;
  border: none;
}

.btn-primary:hover {
  background: #16a34a;
}

.status {
  font-size: 14px;
  opacity: 0.8;
  min-height: 20px;
}

.metric {
  font-size: 26px;
  font-weight: 600;
}

.label {
  font-size: 13px;
  opacity: 0.6;
}

.history {
  max-height: 220px;
  overflow-y: auto;
  font-size: 14px;
}

.badge-rank {
  padding: 6px 12px;
  border-radius: 20px;
  background: #334155;
}

.grid {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 20px;
}

canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}
</style>
</head>

<body>

<div class="wrapper">

  <div class="header">
    <div class="title">Sistema de Avaliação</div>
    <button class="btn btn-outline-light btn-sm" onclick="resetar()">Resetar</button>
  </div>

  <div class="grid">

    <div class="card-custom">
      <h5>Avaliar desempenho</h5>

      <div class="mb-3">
        <label class="label">Identificação</label>
        <input type="text" id="nome" class="form-control" placeholder="Digite seu nome">
      </div>

      <div class="stars my-3">
        <span onclick="avaliar(1)">★</span>
        <span onclick="avaliar(2)">★</span>
        <span onclick="avaliar(3)">★</span>
        <span onclick="avaliar(4)">★</span>
        <span onclick="avaliar(5)">★</span>
      </div>

      <div class="status mb-3" id="status">Nenhuma avaliação selecionada</div>

      <button class="btn btn-primary" onclick="finalizar()">Registrar avaliação</button>
    </div>

    <div class="card-custom">
      <div class="mb-3">
        <div class="label">Média</div>
        <div class="metric" id="media">0</div>
      </div>

      <div class="mb-3">
        <div class="label">Total de avaliações</div>
        <div class="metric" id="total">0</div>
      </div>

      <div>
        <div class="label">Classificação</div>
        <div class="badge-rank" id="rank">-</div>
      </div>
    </div>

  </div>

  <div class="card-custom mt-4">
    <h5>Histórico</h5>
    <div class="history mt-2" id="historico"></div>
  </div>

</div>

<audio id="som" src="https://www.soundjay.com/human/sounds/applause-8.mp3"></audio>
<canvas id="efeitos"></canvas>

<script>
let notaAtual = 0;

function avaliar(nota){
  notaAtual = nota;

  document.querySelectorAll(".stars span").forEach((s,i)=>{
    s.classList.toggle("active", i < nota);
  });

  const status = document.getElementById("status");

  if(nota <= 2){
    status.innerText = "Avaliação baixa registrada";
  } else if(nota === 3){
    status.innerText = "Avaliação neutra";
  } else {
    status.innerText = "Avaliação positiva";
  }
}

function finalizar(){
  const nome = document.getElementById("nome").value.trim();

  if(nome === ""){
    document.getElementById("status").innerText = "Informe seu nome antes de avaliar.";
    return;
  }

  if(notaAtual === 0){
    document.getElementById("status").innerText = "Selecione uma nota.";
    return;
  }

  let dados = JSON.parse(localStorage.getItem("avaliacoes")) || [];

  dados.push({
    nome: nome,
    nota: notaAtual,
    data: new Date().toLocaleString()
  });

  localStorage.setItem("avaliacoes", JSON.stringify(dados));

  document.getElementById("nome").value = "";
  notaAtual = 0;

  document.querySelectorAll(".stars span").forEach(s => s.classList.remove("active"));

  atualizar();
  document.getElementById("som").play();
  iniciarConfete();
}

function atualizar(){
  let dados = JSON.parse(localStorage.getItem("avaliacoes")) || [];

  let total = dados.length;
  let media = total ? (dados.reduce((a,b)=>a+b.nota,0)/total) : 0;

  document.getElementById("media").innerText = media.toFixed(1);
  document.getElementById("total").innerText = total;

  let rank = "Insuficiente";
  if(media >= 4) rank = "Excelente";
  else if(media >= 3) rank = "Bom";
  else if(media >= 2) rank = "Regular";

  document.getElementById("rank").innerText = rank;

  document.getElementById("historico").innerHTML =
    dados.slice().reverse().map((d,i)=>
      `<strong>${d.nome}</strong> — Nota ${d.nota}<br>
       <small>${d.data}</small>`
    ).join("<hr>");
}

function resetar(){
  localStorage.removeItem("avaliacoes");
  location.reload();
}

/* 🔥 CONFETE MELHORADO */
const canvas = document.getElementById("efeitos");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let confetes = [];
let animando = false;

function criarConfete(){
  return {
    x: Math.random() * canvas.width,
    y: Math.random() * -canvas.height,
    size: Math.random() * 5 + 3,
    speedY: Math.random() * 3 + 2,
    opacity: 1,
    decay: Math.random() * 0.01 + 0.005
  };
}

function animar(){
  if(!animando) return;

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  confetes.forEach((c, i) => {
    c.y += c.speedY;
    c.speedY *= 0.98;
    c.opacity -= c.decay;

    ctx.beginPath();
    ctx.arc(c.x, c.y, c.size, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(34,197,94,${c.opacity})`;
    ctx.fill();

    if(c.opacity <= 0){
      confetes.splice(i, 1);
    }
  });

  if(confetes.length === 0){
    animando = false;
    return;
  }

  requestAnimationFrame(animar);
}

function iniciarConfete(){
  confetes = [];

  for(let i = 0; i < 120; i++){
    confetes.push(criarConfete());
  }

  if(!animando){
    animando = true;
    animar();
  }
}

window.onload = atualizar;
</script>

</body>
</html>
